name: LPU Portal

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: List files
        run: ls -la
      - name: Check for index.html
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found!"
          else
            echo "⚠️ Please upload index.html"
          fi
